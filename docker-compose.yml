version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: carteira-digital-app
    volumes:
      - .:/var/www           # mantém seu código sincronizado
    working_dir: /var/www
    networks:
      - carteira-digital
    env_file:
      - .env
    depends_on:
      - db
      - rabbitmq
    command: ["sh", "-c", "composer install && /usr/bin/supervisord -c /etc/supervisor/supervisord.conf -n"]

  webserver:
    image: nginx:alpine
    container_name: carteira-digital-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - carteira-digital
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: carteira-digital-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - ./.docketerized-mysql/mysql:/var/lib/mysql
    networks:
      - carteira-digital

  rabbitmq:
    image: rabbitmq:3-management
    container_name: carteira-digital-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST}
    networks:
      - carteira-digital

networks:
  carteira-digital:
    driver: bridge
